  <g transform="translate(590,130)">
    <path d="M0,-52 L42,-36 L42,2 C42,32 0,52 0,52 C0,52 -42,32 -42,2 L-42,-36 Z" fill="rgba(56,217,195,.12)" stroke="url(#ac)" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M-18,0 L-5,14 L20,-14" fill="none" stroke="url(#ac)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="44" y="192" font-family="Consolas, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#38d9c3">MIGRANT WORKER SAFETY</text>
  <text x="42" y="230" font-family="'Segoe UI', 'Inter', sans-serif" font-size="34" font-weight="700" fill="#dbe4f5">MigraSafe</text>
